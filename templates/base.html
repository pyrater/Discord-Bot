<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TARS // NEXUS CORE{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #040609;
            --panel-bg: rgba(8, 12, 18, 0.92);
            --panel-border: rgba(0, 229, 255, 0.2);
            --text-main: #e0e6ed;
            --text-dim: #6b8299;
            --cyan: #00e5ff;
            --magenta: #ff00ff;
            --green: #39ff14;
            --orange: #ffb700;
            --tars-cyan: #00e5ff;
            --tars-cyan-glow: rgba(0, 229, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 248, 255, 0.01) 2px, rgba(0, 248, 255, 0.01) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(4, 6, 9, 0.98);
            border-bottom: 1px solid var(--panel-border);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .brand {
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-dim);
        }

        .brand span {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        .header-metrics {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .hm-item {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        .hm-val {
            color: var(--text-main);
            font-size: 14px;
            font-weight: bold;
        }

        main {
            flex: 1;
            padding: 20px;
        }

        /* Shared components */
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            border-left: 3px solid var(--cyan);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(4, 6, 9, 0.9);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.5);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="scanline-overlay"></div>
    <div class="app-container">
        <header>
            <div class="brand">TARS // <span>NEXUS</span></div>
            <div class="header-metrics">
                <div class="hm-item">CPU<br><span id="header-cpu" class="hm-val">--%</span></div>
                <div class="hm-item">RAM<br><span id="header-ram" class="hm-val">--%</span></div>
                <div class="hm-item">STATUS<br><span id="header-status" class="hm-val">{{ state|default("STANDBY")
                        }}</span></div>
                <div style="width: 10px; height: 10px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 8px var(--cyan);"
                    class="pulse"></div>
            </div>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        async function updateStats() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                document.getElementById('header-cpu').textContent = d.cpu + '%';
                document.getElementById('header-ram').textContent = d.ram + '%';
                document.getElementById('header-status').textContent = d.state;
            } catch (e) { }
        }
        setInterval(updateStats, 5000);
        updateStats();
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
