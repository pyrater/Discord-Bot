<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS // AUTHENTICATION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #040609;
            --panel-bg: rgba(8, 12, 18, 0.92);
            --panel-border: rgba(0, 229, 255, 0.2);
            --cyan: #00e5ff;
            --text-main: #e0e6ed;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-box {
            width: 350px;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.1);
            border-radius: 4px;
            text-align: center;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            letter-spacing: 5px;
            margin-bottom: 30px;
        }

        h1 span {
            color: var(--cyan);
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .error {
            color: #f85149;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>TARS // <span>AUTH</span></h1>
        <form method="POST">
            <input type="password" name="password" placeholder="[ ENTER ACCESS KEY ]" required autofocus>
            <button type="submit">ACCESS SYSTEM</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </div>
</body>

</html>
